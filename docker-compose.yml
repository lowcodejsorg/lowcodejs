name: low-code-js

services:
  mongo:
    image: mongo:latest
    container_name: low-code-js-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mongo-volume:/data/db
    ports:
      - "27017:27017"
    networks:
      - low-code-js-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile-local
    container_name: low-code-js-api
    restart: unless-stopped
    ports:
      - "${APP_SERVER_PORT}:3000"
    env_file: .env
    networks:
      - low-code-js-network
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health-check"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build:
      context: ./frontend
      dockerfile: Dockerfile-local
    container_name: low-code-js-app
    restart: unless-stopped
    ports:
      - "${APP_CLIENT_PORT}:5173"
    env_file: .env
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
      - PORT=5173
    networks:
      - low-code-js-network
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules

  minio:
    image: minio/minio:latest
    container_name: low-code-js-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-lowcodejs}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-lowcodejs123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-volume:/data
    networks:
      - low-code-js-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: low-code-js-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-volume:/data
    networks:
      - low-code-js-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mcp:
    image: ${DOCKER_USERNAME}/lowcodejs-mcp:latest
    container_name: low-code-js-mcp
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-3001}:3000"
    environment:
      - LOWCODE_API_URL=http://api:3000
      - PORT=3000
      - CORS_ORIGIN=*
    networks:
      - low-code-js-network
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health-check"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mongo-volume:
    driver: local
  redis-volume:
    driver: local
  minio-volume:
    driver: local

networks:
  low-code-js-network:
    driver: bridge
