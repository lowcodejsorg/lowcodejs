name: ${COMPOSE_PROJECT_NAME}

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    mem_limit: 512m
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.25"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mongo-volume:/data/db
    networks:
      - traefik-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  api:
    image: ${API_IMAGE}
    restart: unless-stopped
    mem_limit: 256m
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      DB_NAME: ${DB_NAME}
      APP_SERVER_URL: ${APP_SERVER_URL}
      APP_CLIENT_URL: ${APP_CLIENT_URL}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      COOKIE_SECRET: ${COOKIE_SECRET}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      EMAIL_PROVIDER_HOST: ${EMAIL_PROVIDER_HOST}
      EMAIL_PROVIDER_PORT: ${EMAIL_PROVIDER_PORT}
      EMAIL_PROVIDER_USER: ${EMAIL_PROVIDER_USER}
      EMAIL_PROVIDER_PASSWORD: ${EMAIL_PROVIDER_PASSWORD}
      LOGO_SMALL_URL: ${LOGO_SMALL_URL}
      LOGO_LARGE_URL: ${LOGO_LARGE_URL}
      REDIS_URL: redis://${COMPOSE_PROJECT_NAME}-redis-1:6379
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-}
      LOCALE: ${LOCALE:-pt-br}
      PAGINATION_PER_PAGE: ${PAGINATION_PER_PAGE:-20}
      FILE_UPLOAD_MAX_SIZE: ${FILE_UPLOAD_MAX_SIZE:-10485760}
      FILE_UPLOAD_ACCEPTED: ${FILE_UPLOAD_ACCEPTED:-jpg;jpeg;png;pdf;doc;docx;xls;xlsx;txt;zip;rar}
      FILE_UPLOAD_MAX_FILES_PER_UPLOAD: ${FILE_UPLOAD_MAX_FILES_PER_UPLOAD:-10}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MCP_SERVER_URL: ${MCP_SERVER_URL:-}
    volumes:
      - storage-api-volume:/app/_storage
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - traefik-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-api.rule=Host(`${API_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-api.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-api.tls.certresolver=myresolver"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-api.loadbalancer.server.port=3000"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-api-http.rule=Host(`${API_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-api-http.entrypoints=web"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-api-http.middlewares=https-only@file"

  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    mem_limit: 256m
    environment:
      VITE_API_BASE_URL: ${APP_SERVER_URL}
      NITRO_PORT: 3000
      NITRO_HOST: 0.0.0.0
    depends_on:
      - api
    networks:
      - traefik-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 120s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-app.rule=Host(`${APP_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-app.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-app.tls.certresolver=myresolver"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-app.loadbalancer.server.port=3000"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-app-http.rule=Host(`${APP_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-app-http.entrypoints=web"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-app-http.middlewares=https-only@file"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME}-app-headers.headers.customResponseHeaders.Cache-Control=no-cache, no-store, must-revalidate"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME}-app-headers.headers.customResponseHeaders.Pragma=no-cache"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME}-app-headers.headers.customResponseHeaders.Expires=0"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-app.middlewares=${COMPOSE_PROJECT_NAME}-app-headers"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 128m
    command: ["redis-server", "--maxmemory", "100mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-volume:/data
    networks:
      - traefik-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mcp:
    profiles: ["ai"]
    image: ${MCP_IMAGE:-indiodev/lowcodejs-mcp:latest}
    restart: unless-stopped
    mem_limit: 128m
    environment:
      LOWCODE_API_URL: http://${COMPOSE_PROJECT_NAME}-api-1:3000
      PORT: 3000
      CORS_ORIGIN: "*"
    depends_on:
      - api
    networks:
      - traefik-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health-check"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-mcp.rule=Host(`${MCP_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-mcp.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-mcp.tls.certresolver=myresolver"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-mcp.loadbalancer.server.port=3000"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-mcp-http.rule=Host(`${MCP_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-mcp-http.entrypoints=web"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-mcp-http.middlewares=https-only@file"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME}-mcp-headers.headers.customResponseHeaders.X-Accel-Buffering=no"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-mcp.middlewares=${COMPOSE_PROJECT_NAME}-mcp-headers"

volumes:
  mongo-volume:
    driver: local
  redis-volume:
    driver: local
  storage-api-volume:
    driver: local

networks:
  traefik-network:
    external: true
