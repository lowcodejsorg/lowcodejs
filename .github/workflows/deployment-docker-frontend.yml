name: Docker Frontend

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: frontend-build
          path: frontend/

      - name: Remove .dockerignore (permite copiar build artifacts)
        run: rm -f frontend/.dockerignore

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile-production
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/lowcodejsorg/lowcodejs-app:${{ inputs.branch }}
          cache-from: type=gha,scope=frontend-${{ inputs.branch }}
          cache-to: type=gha,mode=max,scope=frontend-${{ inputs.branch }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Copy image to Docker Hub
        run: docker buildx imagetools create ghcr.io/lowcodejsorg/lowcodejs-app:${{ inputs.branch }} --tag ${{ secrets.DOCKERHUB_USERNAME }}/lowcodejs-app:${{ inputs.branch }}
